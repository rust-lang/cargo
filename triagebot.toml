[relabel]
allow-unauthenticated = [
    "A-*",
    "C-*",
    "Command-*",
    "E-*",
    "I-*",
    "O-*",
    "S-*",
    "Z-*",
    "beta-nominated",
    "regression-*",
    "relnotes",
]

[ping.windows]
message = """\
Hey Windows Group! This bug has been identified as a good "Windows candidate".
In case it's useful, here are some [instructions] for tackling these sorts of
bugs. Maybe take a look?
Thanks! <3

[instructions]: https://rustc-dev-guide.rust-lang.org/notification-groups/windows.html
"""
label = "O-windows"

[shortcut]

# Enable issue transfers within the org
# Documentation at: https://forge.rust-lang.org/triagebot/transfer.html
[transfer]

# Enable `@rustbot note` functionality
# Documentation at: https://forge.rust-lang.org/triagebot/note.html
[note]

# Enable comments linking to triagebot range-diff when a PR is rebased
# onto a different base commit
# Documentation at: https://forge.rust-lang.org/triagebot/range-diff.html
[range-diff]

# Adds at the end of a review body a link to view the changes that happened
# since the review
# Documentation at: https://forge.rust-lang.org/triagebot/review-changes-since.html
[review-changes-since]

# Adds a "View all comments" link on the issue body that shows all the comments of an issue/PR
# Documentation at: https://forge.rust-lang.org/triagebot/view-all-comments-link.html
[view-all-comments-link]
threshold = 20

[merge-conflicts]
remove = []
add = ["S-waiting-on-author"]
unless = ["S-blocked", "S-waiting-on-review"]

[autolabel."S-waiting-on-review"]
new_pr = true

[assign]
contributing_url = "https://rust-lang.github.io/cargo/contrib/"
warn_non_default_branch = true

[assign.owners]
"*" = ["@epage", "@weihanglo"]

[review-submitted]
reviewed_label = "S-waiting-on-author"
review_labels = ["S-waiting-on-review"]

[review-requested]
remove_labels = ["S-waiting-on-author"]
add_labels = ["S-waiting-on-review"]

