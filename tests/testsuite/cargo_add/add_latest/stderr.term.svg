<svg width="740px" height="128px" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #AAAAAA }
    .bg { fill: #000000 }
    .fg-bright-green { fill: #55FF55 }
    .fg-bright-red { fill: #FF5555 }
    .container {
      padding: 0 10px;
      line-height: 18px;
    }
    .bold { font-weight: bold; }
    tspan {
      font: 14px SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace;
      white-space: pre;
      line-height: 18px;
    }
  </style>

  <rect width="100%" height="100%" y="0" rx="4.5" class="bg" />

  <text xml:space="preserve" class="container fg">
    <tspan x="10px" y="28px"><tspan class="fg-bright-green bold">    Updating</tspan><tspan> `dummy-registry` index</tspan>
</tspan>
    <tspan x="10px" y="46px"><tspan class="fg-bright-red bold">error</tspan><tspan>: invalid version requirement `latest`</tspan>
</tspan>
    <tspan x="10px" y="64px">
</tspan>
    <tspan x="10px" y="82px"><tspan>help: to use `0.4.2`, run `cargo add my-package`</tspan>
</tspan>
    <tspan x="10px" y="100px"><tspan>help: to use the latest version, run `cargo add my-package@99999.0.0`</tspan>
</tspan>
    <tspan x="10px" y="118px">
</tspan>
  </text>

</svg>
